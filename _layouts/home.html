<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google-site-verification" content="h4Q727xB47mmR4MjGeO_jyBYk_FTeIpcUcgGBIflpHQ">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    /* minimal safety net if CSS fails to load */
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; line-height: 1.6; }
    header { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #eee; z-index: 10; }
    nav { max-width: 920px; margin: 0 auto; padding: .75rem 1rem; display: flex; gap: 1rem; align-items: baseline; }
    nav a { text-decoration: none; color: #0366d6; }
    main { max-width: 920px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    section { padding: 3rem 0 1rem; }
    h1, h2 { margin: 0 0 .5rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <strong>{{ site.title }}</strong>
      <span style="flex:1"></span>
      <a href="{{ '#about-pro' | relative_url }}">About</a>
      <a href="{{ '#publications' | relative_url }}">Publications</a>

      <div class="social-icons" aria-label="Social links">
        {% if site.social.email %}
          <a class="icon" href="mailto:{{ site.social.email | escape }}" aria-label="Email">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16v12H4V6zm8 7L5.5 8.5v9h13v-9L12 13zm0-2.2L18.5 7.5h-13L12 10.8z"/>
            </svg>
          </a>
        {% endif %}

        {% if site.social.scholar %}
          <a class="icon" href="{{ site.social.scholar | escape }}" target="_blank" rel="noopener" aria-label="Google Scholar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3 1 9l11 6 9-4.9V17h2V9L12 3zm-6.2 9.2V16c0 1.7 2.8 3 6.2 3s6.2-1.3 6.2-3v-3.8L12 16l-6.2-3.8z"/>
            </svg>
          </a>
        {% endif %}

        {% if site.social.linkedin %}
          <a class="icon" href="{{ site.social.linkedin | escape }}" target="_blank" rel="noopener" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM0.5 23.5h4V7.98h-4V23.5zM8.5 7.98h3.8v2.12h.05c.53-1 1.83-2.12 3.77-2.12 4.03 0 4.78 2.65 4.78 6.1v9.42h-4v-8.36c0-2-.04-4.56-2.78-4.56-2.78 0-3.2 2.17-3.2 4.42v8.5h-4V7.98z"/>
            </svg>
          </a>
        {% endif %}

        {% if site.social.x %}
          <a class="icon" href="{{ site.social.x | escape }}" target="_blank" rel="noopener" aria-label="X">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18.9 2H22l-6.8 7.8L23 22h-6.5l-5.1-6.6L5.8 22H2l7.4-8.5L1 2h6.7l4.6 6L18.9 2zm-1.2 18h1.7L7.3 3.9H5.5L17.7 20z"/>
            </svg>
          </a>
        {% endif %}

        {% if site.social.bluesky %}
          <a class="icon" href="{{ site.social.bluesky | escape }}" target="_blank" rel="noopener" aria-label="Bluesky">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 12c1.6-2.2 5.2-6 8-6 1.1 0 2 .9 2 2 0 4-4.6 6.4-7.2 7 2.6.6 7.2 3 7.2 7 0 1.1-.9 2-2 2-2.8 0-6.4-3.8-8-6-1.6 2.2-5.2 6-8 6-1.1 0-2-.9-2-2 0-4 4.6-6.4 7.2-7C4.6 14.4 0 12 0 8c0-1.1.9-2 2-2 2.8 0 6.4 3.8 8 6z"/>
            </svg>
          </a>
        {% endif %}
      </div>
    </nav>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer style="border-top:1px solid #eee; padding:1rem; text-align:center;">
    <small>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</small>
  </footer>
  <script src="{{ '/assets/js/typewriter.js' | relative_url }}"></script>
</body>
</html>
